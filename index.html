<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  </head>
  <body>
    <!-- Paste <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maleah's Mega Playpad</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐠</text></svg>">

    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ff9a00, #ff5e62);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .nav-bar {
            display: flex; justify-content: space-around; background: rgba(255,255,255,0.2); padding: 10px;
            overflow-x: auto; gap: 5px;
        }
        .nav-btn {
            background: white; border: none; padding: 10px 12px; font-size: 14px;
            font-weight: bold; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            white-space: nowrap;
        }
        .view-panel { flex: 1; display: none; padding: 15px; position: relative; }
        .view-panel.active { display: block; }
        
        /* Main Grid Buttons */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 100%; }
        .card {
            background: white; border-radius: 25px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            cursor: pointer; border: 4px solid #fff; padding: 10px;
        }
        .card:active { transform: scale(0.95); }
        .emoji { font-size: 55px; }
        .label { font-size: 16px; font-weight: bold; margin-top: 5px; color: #ff5e62; text-transform: uppercase; text-align: center; }
        
        /* 3D Card Flip Layout */
        .flip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 100%; }
        .flip-container { perspective: 1000px; cursor: pointer; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.6s; transform-style: preserve-3d;
        }
        .flip-container.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 25px; border: 4px solid white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .flip-front { background: #4D96FF; color: white; font-size: 50px; }
        .flip-back { background: white; transform: rotateY(180deg); }

        /* Piano Keys Layout */
        .piano-container { display: flex; flex-direction: column; height: 100%; }
        .piano-keyboard { display: flex; flex: 1; gap: 8px; background: #333; padding: 15px; border-radius: 25px; }
        .piano-key {
            flex: 1; background: white; border-radius: 0 0 15px 15px; cursor: pointer;
            box-shadow: 0 6px 0 #bbb, 0 10px 10px rgba(0,0,0,0.2);
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px;
            font-size: 24px; font-weight: bold; transition: all 0.1s;
        }
        .piano-key:active { transform: translateY(4px); box-shadow: 0 2px 0 #bbb, 0 4px 5px rgba(0,0,0,0.2); }
        
        /* Interactive Apple Tree Game Layout */
        .apple-game-container {
            display: flex; flex-direction: column; height: 100%; background: #e0f7fa; border-radius: 25px; padding: 10px; overflow: hidden; position: relative;
        }
        .tree-area {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .tree-canopy { font-size: 140px; z-index: 2; position: relative; filter: drop-shadow(0 10px 5px rgba(0,0,0,0.1)); }
        .tree-canopy:active { transform: scale(0.95); }
        .falling-apple {
            position: absolute; font-size: 40px; z-index: 1;
            animation: fallDown 1s forwards cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }
        @keyframes fallDown {
            0% { top: 30%; transform: scale(0.5); opacity: 1; }
            100% { top: 85%; transform: scale(1) rotate(15deg); opacity: 1; }
        }
        .basket-area {
            height: 50px; background: #8d6e63; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; font-weight: bold; box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Interactive Ocean Water Game Layout */
        .ocean-game-container {
            display: flex; flex-direction: column; height: 100%; background: linear-gradient(to bottom, #4ea3fc, #0052a3); border-radius: 25px; padding: 10px; overflow: hidden; position: relative;
        }
        .water-play-zone {
            flex: 1; position: relative; cursor: pointer;
        }
        .swimming-fish {
            position: absolute; font-size: 45px; transition: transform 0.5s ease-out, opacity 0.5s;
            animation: swimBubble 3s infinite ease-in-out alternate;
        }
        @keyframes swimBubble {
            0% { transform: translateY(0px) scaleX(1); }
            100% { transform: translateY(-10px) scaleX(1); }
        }
        .ocean-btn-area {
            display: flex; gap: 10px; margin-bottom: 5px;
        }
        .ocean-action-btn {
            flex: 1; padding: 12px; background: #fff; border: none; border-radius: 15px; font-weight: bold; color: #0052a3; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* CUSTOM WELCOME SCREEN OVERLAY WITH REQUESTED TEXT BRACKETS */
        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(to bottom, #ff5e62, #ff9a00);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 100; text-align: center; padding: 40px 20px; box-sizing: border-box;
        }
        .welcome-title { font-size: 42px; font-weight: bold; margin: 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); letter-spacing: 2px; }
        .welcome-sub { font-size: 22px; margin-top: 10px; opacity: 0.9; }
        .start-btn { 
            background: white; color: #ff5e62; border: none; padding: 22px 50px; 
            font-size: 28px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25); animation: pulse 1.8s infinite; transition: 0.2s;
        }
        .start-btn:active { transform: scale(0.9); }
        .welcome-footer { font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.25); letter-spacing: 1px; margin: 0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- RECONFIGURED OPENING DESIGN -->
    <div id="overlay">
        <div>
            <h1 class="welcome-title">🌟 MALEAH'S PLAYPAD 🌟</h1>
            <div class="welcome-sub">Are you ready to go up, up, up? ✨</div>
        </div>
        
        <button class="start-btn" onclick="initApp()">TAP TO PLAY!</button>
        
        <h2 class="welcome-footer">💖 DADDY'S BABY GIRL 💖</h2>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="showTab('home')">🎵 Music</button>
        <button class="nav-btn" onclick="showTab('piano')">🎹 Piano</button>
        <button class="nav-btn" onclick="showTab('flips')">🐶 Flips</button>
        <button class="nav-btn" onclick="showTab('learn')">🌳 Apples</button>
        <button class="nav-btn" onclick="showTab('ocean')">🐠 Ocean Add</button>
    </div>

    <!-- MUSIC TAB -->
    <div id="home" class="view-panel active">
        <div class="grid">
            <div class="card" onclick="speak('We are going up up up! It is our moment! We are going to be golden!')">
                <span class="emoji">🚀</span>
                <span class="label">Golden!</span>
            </div>
            <div class="card" onclick="speak('Five little monkeys jumping on the bed! One fell off and bumped his head!')">
                <span class="emoji">🐵</span>
                <span class="label">5 Monkeys</span>
            </div>
            <div class="card" onclick="speak('Bluey says, wackadoo! Let us play a game!')">
                <span class="emoji">💙</span>
                <span class="label">Bluey Time</span>
            </div>
            <div class="card" onclick="speak('I am Maleah, and I am daddys baby girl!')">
                <span class="emoji">👸</span>
                <span class="label">Who am I?</span>
            </div>
        </div>
    </div>

    <!-- PIANO TAB -->
    <div id="piano" class="view-panel">
        <div class="piano-container">
            <div style="color:white; text-align:center; margin-bottom:10px; font-weight:bold;">🎹 TAP TO PLAY MUSIC! 🎹</div>
            <div class="piano-keyboard">
                <div class="piano-key" style="background:#FF4D4D;" onclick="playNote(261.63)">🔴</div>
                <div class="piano-key" style="background:#FFA64D;" onclick="playNote(293.66)">🟠</div>
                <div class="piano-key" style="background:#FFD93D;" onclick="playNote(329.63)">🟡</div>
                <div class="piano-key" style="background:#6BCB77;" onclick="playNote(349.23)">🟢</div>
                <div class="piano-key" style="background:#4D96FF;" onclick="playNote(392.00)">🔵</div>
                <div class="piano-key" style="background:#B52BFF;" onclick="playNote(440.00)">🟣</div>
            </div>
        </div>
    </div>

    <!-- CARTOON CARD FLIPS TAB -->
    <div id="flips" class="view-panel">
        <div class="flip-grid">
            <div class="flip-container" onclick="flipCard(this, 'Chase is on the case!')">
                <div class="flip-card-inner">
                    <div class="flip-front">❓</div>
                    <div class="flip-back"><span class="emoji">🐶</span><span class="label">Chase</span></div>
                </div>
            </div>
            <div class="flip-container" onclick="flipCard(this, 'Skye has gotta fly!')">
                <div class="flip-card-inner">
                    <div class="flip-front">❓</div>
                    <div class="flip-back"><span class="emoji">🚁</span><span class="label">Skye</span></div>
                </div>
            </div>
            <div class="flip-container" onclick="flipCard(this, 'Hooray! It is Bluey!')">
                <div class="flip-card-inner">
                    <div class="flip-front">❓</div>
                    <div class="flip-back"><span class="emoji">🐕</span><span class="label">Bluey</span></div>
                </div>
            </div>
            <div class="flip-container" onclick="flipCard(this, 'Dance mode activated with Bingo!')">
                <div class="flip-card-inner">
                    <div class="flip-front">❓</div>
                    <div class="flip-back"><span class="emoji">🧡</span><span class="label">Bingo</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- LEARNING TAB WITH INTERACTIVE FALLING APPLES -->
    <div id="learn" class="view-panel">
        <div class="apple-game-container">
            <div style="text-align: center; color: #333; font-weight: bold; font-size: 18px;">🌳 TAP THE TREE TO DROP APPLES!</div>
            <div class="tree-area" onclick="dropApple()">
                <div class="tree-canopy">🌳</div>
                <div id="apple-drop-zone"></div>
            </div>
            <div class="basket-area" id="score-basket">🧺 Basket: 0 Apples</div>
        </div>
    </div>

    <!-- INTERACTIVE WATER ADDITION TAB -->
    <div id="ocean" class="view-panel">
        <div class="ocean-game-container">
            <div class="ocean-btn-area">
                <button class="ocean-action-btn" onclick="startWaterGame()">💦 Splash Game!</button>
                <button class="ocean-action-btn" onclick="checkWaterTotal()" style="background:#ffffd0;">🤔 How many total?</button>
            </div>
            <div class="water-play-zone" id="ocean-floor"></div>
            <div class="basket-area" id="ocean-status" style="background:#003c77;">💧 Tap Splash Game to start!</div>
        </div>
    </div>

    <script>
        let started = false;
        let audioCtx = null;
        let appleCount = 0;
        let waterGameState = 0;

        function initApp() {
            if (started) return;
            started = true;
            document.getElementById('overlay').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            speak("Hello, Maleah! You are daddy's baby girl! Let's play!");
        }

        function showTab(tabId) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            if (tabId === 'learn') {
                speak("Daddy made this tree grow for you to learn to add!");
            }
            if (tabId === 'ocean') {
                clearOcean();
                speak("Let's play in the water! Tap Splash Game to count fish!");
                document.getElementById('ocean-status').innerText = "💧 Tap Splash Game!";
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.pitch = 1.4; msg.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        function playNote(frequency) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = frequency;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        function flipCard(element, characterCatchphrase) {
            element.classList.toggle('flipped');
            if(element.classList.contains('flipped')) {
                speak(characterCatchphrase);
            }
        }

        function dropApple() {
            appleCount++;
            playNote(150 + (appleCount * 20)); 
            speak(appleCount + "!");
            document.getElementById('score-basket').innerText = "🧺 Basket: " + appleCount + " Apples!";

            const dropZone = document.getElementById('apple-drop-zone');
            const apple = document.createElement('div');
            apple.className = 'falling-apple';
            apple.innerText = '🍎';
            const randomX = Math.floor(Math.random() * 60) - 30;
            apple.style.left = `calc(50% + ${randomX}px)`;
            dropZone.appendChild(apple);
            setTimeout(() => { apple.remove(); }, 1000);
        }

        function clearOcean() {
            document.getElementById('ocean-floor').innerHTML = '';
            waterGameState = 0;
        }

        function spawnFish(emoji, count, baseTop) {
            const floor = document.getElementById('ocean-floor');
            for(let i=0; i<count; i++) {
                const fish = document.createElement('div');
                fish.className = 'swimming-fish';
                fish.innerText = emoji;
                fish.style.left = (20 + (i * 25)) + '%';
                fish.style.top = baseTop + '%';
                fish.onclick = (e) => { e.stopPropagation(); playNote(600); };
                floor.appendChild(fish);
            }
        }

        function startWaterGame() {
            if (waterGameState === 0) {
                clearOcean();
                spawnFish('🐠', 3, 25);
                playNote(400);
                speak("Look! One, two, three orange fish swimming in the water!");
                document.getElementById('ocean-status').innerText = "🐠 3 Orange Fish! Tap Splash again!";
                waterGameState = 1;
            } else if (waterGameState === 1) {
                spawnFish('🐟', 2, 60);
                playNote(500);
                speak("Look out! One, two more green fish swim out!");
                document.getElementById('ocean-status').innerText = "🐠 3 Orange + 🐟 2 Green Fish!";
                waterGameState = 2;
                setTimeout(() => { speak("How many total fish is there now, Maleah?"); }, 3000);
            } else {
                clearOcean();
                startWaterGame();
            }
        }

        function checkWaterTotal() {
            if (waterGameState < 2) {
                speak("Tap Splash Game first to bring all the fish out!");
                return;
            }
            playNote(523.25);
            speak("Three orange fish plus two green fish makes five fish total! You are so smart!");
            document.getElementById('ocean-status').innerText = "🎉 3 + 2 = 5 Fish Total!";
        }
    </script>
</body>
</html>
